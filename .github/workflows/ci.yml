name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Install + typecheck + unit tests + build ─────────────────────────────
  verify:
    name: Verify (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]

    env:
      # Zod env schema needs these at build time even though nothing ships with them.
      APP_SECRET: ci-placeholder-secret-must-be-at-least-32-chars-long
      ALLOWED_ORIGINS: http://localhost:4321
      DATABASE_URL: file:./data/pomelo.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Typecheck (astro check)
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: |
          node --env-file-if-exists=.env ./node_modules/astro/astro.js build

      - name: Upload build artifact
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # ─── Docker build smoke-test ──────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: pomelo-smp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_SECRET=ci-placeholder-secret-must-be-at-least-32-chars-long
